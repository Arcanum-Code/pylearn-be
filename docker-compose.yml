services:
  app:
    image: ghcr.io/arcanum-code/pylearn-be:main
    container_name: pylearn-backend
    env_file:
      - .env.docker
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    networks:
      pylearn-network:
        aliases:
          - backend

  db:
    image: postgres:16
    container_name: pylearn-db
    environment:
      POSTGRES_DB: pylearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pylearn-network

  frontend:
    image: ghcr.io/arcanum-code/pylearn-fe:main
    container_name: pylearn-frontend
    depends_on:
      - app
    environment:
      - API_URL=http://backend:4000
    networks:
      - pylearn-network

  caddy:
    image: caddy:2
    container_name: pylearn-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - app
    networks:
      - pylearn-network

networks:
  pylearn-network:
    driver: bridge

volumes:
  postgres-data:
  caddy_data:
  caddy_config:
